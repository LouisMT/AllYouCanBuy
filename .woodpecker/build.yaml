when:
  - event: push
    branch: main
  - event: manual

steps:
  - name: dependencies
    image: cm2network/steamcmd:latest
    commands:
      - /home/steam/steamcmd/steamcmd.sh +login "$$STEAM_USERNAME" "$$STEAM_PASSWORD" +app_update 1755940 +quit
      - cp -a "/home/steam/Steam/steamapps/common/PlateUp! Demo" PlateUp
    environment:
      STEAM_USERNAME:
        from_secret: STEAM_USERNAME
      STEAM_PASSWORD:
        from_secret: STEAM_PASSWORD
  - name: build
    image: mcr.microsoft.com/dotnet/sdk:latest
    commands:
      - dotnet build -p "PlateUpGamePath=$$(pwd)/PlateUp/PlateUp" -c Release
